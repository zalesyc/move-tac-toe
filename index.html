<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="/src/style.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer type="module" src="/src/main.ts"></script>
    <title>move-tac-toe</title>
  </head>
  <body
    class="max-w-2xl mr-auto ml-auto bg-zinc-200 flex flex-col gap-6 h-full mt-6"
  >
    <h1 class="font-bold text-4xl">Hybnéškvorky</h1>

    <div class="self-center space-y-3">
      <div class="flex gap-6 justify-end">
        <button
          id="new-game-btun"
          class="bg-neutral-400 rounded-xl shadow-xl p-4 text-white"
        >
          Join Game
        </button>
        <button
          id="new-game-btn"
          class="bg-teal-700 rounded-xl shadow-xl p-4 text-white hover:bg-teal-800"
        >
          New Game
        </button>
      </div>
      <div class="border-zinc-400 bg-amber-100 border-2 rounded-lg w-120 h-120">
        <game-board size="4" id="board"></game-board>
      </div>
      <div class="flex items-center gap-4">
        <p>Playing:</p>
        <div id="currently-playing" class="w-10 h-10 rounded-full"></div>
      </div>
    </div>

    <!-- DIALOGS -->
    <dialog
      id="new-game-dialog"
      class="p-5 bg-teal-700 rounded-xl shadow-xl text-white space-y-5"
    >
      <h2 class="text-lg font-bold">New Game:</h2>
      <div class="flex *:p-3">
        <button class="border-r-2 bg-fuchsia-700 border-white rounded-l-xl">
          Local
        </button>
        <button class="rounded-r-xl bg-neutral-500">Online</button>
      </div>

      <form id="new-game-form" action="" method="dialog">
        <div class="space-y-3">
          <div>
            <label for="board-size">Board size:</label>
            <input
              type="number"
              name="board-size"
              id="board-size"
              min="4"
              max="10"
              step="2"
              value="4"
              class="bg-neutral-200 rounded-sm text-black"
            />
          </div>
          <div>
            <label for="win-len">Win length:</label>
            <input
              type="number"
              name="win-len"
              id="win-len"
              value="3"
              class="bg-neutral-200 rounded-sm text-black"
            />
          </div>
          <div>
            <label for="allow-diagonals">Allow diagonals:</label>
            <input
              type="checkbox"
              name="allow-diagonals"
              id="allow-diagonals"
            />
          </div>
        </div>
        <div class="flex gap-4 *:p-3 *:rounded-xl">
          <button
            id="new-game-play-btn"
            type="submit"
            class="bg-fuchsia-700 hover:bg-fuchsia-800"
          >
            Play!
          </button>
          <button
            id="new-game-close-btn"
            type="submit"
            formmethod="dialog"
            class="bg-red-700 hover:bg-red-800"
          >
            Close
          </button>
        </div>
      </form>
    </dialog>

    <dialog
      id="win-dialog"
      class="p-5 bg-teal-700 rounded-xl shadow-xl text-white space-y-5"
    >
      <p id="win-text"></p>
      <button>Close</button>
    </dialog>
  </body>
</html>
